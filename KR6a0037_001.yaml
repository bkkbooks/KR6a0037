body:
  text: 失譯人名今附東晉錄聞如是一時佛在舍衛國祇樹給孤獨園佛告諸比丘愛訒深有榮色未起為纏沒住亦有本栽非無緣致愛有耽荒本致熟在狂醉為受不明觀解是名癡本癡緣所生亦為有本何等為本眩曜色聲五蓋馳惑斯生癡本矣五蓋蔽冥致影沈吟亦為有本何等為本三惡種牽斯謂為本三惡栽習亦為有本何等為本不攝根識斯亦為本不攝根識緣致有本何等為本謂非所應念專候不已斯謂本也非應所念亦從本緣不為無本何等為本不從正信迷於所向斯謂本也不信從謬亦有緣致非為無本何等為本惡師所引非法聽受斯謂為本非正失聽亦有緣本何等為本違背賢聖英㑺之聚斯謂為本乖錯賢㑺緣致違背亦為有本何等為本失於戴仰虛心集樂斯謂本矣如是比丘夫失賢眾清高之聚身口意行視聽惑滿胸心閉塞矣以非法見信向毀矣正道負背則邪見增邪見增則內攝喪內攝喪則三惡興恣三惡興恣則五蓋盈滿五蓋盈滿則癡本足癡本足則愛受盛以斯轉種增著猗有塵染無際矣度世明慧昇于脫要亦為有本何謂度世智慧解脫之本七覺法妙謂為致本七覺鏡照亦為有本何等為本謂四意止斯則覺本四意靜止由從有本非無有本其義焉在謂清淨潔妙其行在三三清淨行亦為有本非無有本本義為何謂守攝諸根斯則為本守攝諸根亦為有本非無有本本義為何謂鏡鑑玄照斯為本念矣本念照往亦為有本緣致入正何等為本本念造勝謂之樹信信亦有本不為無本何等信本謂多聞經道次第典要斯謂為本聞於經法亦為有本不為無本何等聞法謂賢行澄清業真者也賢者清淨亦為有本何等為本謂㑺行清真潔白之聚如是比丘賢者集勝依附明哲奉事多聞能致信本信本已立便得正念正念已樹守攝諸根根守已建登三行淨已三清淨便四意止四意止立便七覺意七覺意成立是即無為解脫度世佛說如是弟子受行
